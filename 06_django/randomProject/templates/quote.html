<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quote Generator</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Random Quote Generator</h1>

<h2>"{{ quote }}"</h2>

<br>

<form action="{% url 'quote' %}" method="get">
    <button type="submit">New Quote</button>
</form>

<section aria-labelledby="what-you-learned-title">
    <h3 id="what-you-learned-title">What You Learned</h3>

    <ul>
        <li>Using Python's <code>random</code> module</li>
        <li>Passing dynamic data to a Django template</li>
        <li>Simple user interaction (button refresh)</li>
    </ul>
</section>

</body>
</html>
