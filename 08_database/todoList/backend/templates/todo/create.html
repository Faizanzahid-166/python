
  <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-100">

    <div class="max-w-xl mx-auto mt-12 bg-white shadow-lg rounded-xl p-6">

        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            ➕ Create Todo
        </h1>

        <!-- Back Button -->
        <div class="mb-4">
            <a href="/todo/list/" 
               class="text-blue-500 hover:underline">
                ← Back to List
            </a>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Title Input -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Title
                </label>
                <input type="text" name="title" placeholder="Enter title..."
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Description
                </label>
                <textarea name="description" rows="4" placeholder="Enter description..."
                          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
            </div>

            <!-- Submit Button -->
            <div class="text-right">
                <button type="submit"
                        class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg shadow">
                    ✅ Create Todo
                </button>
            </div>

        </form>

    </div>

</body>
