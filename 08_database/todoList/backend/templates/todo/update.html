<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Todo</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-xl mx-auto mt-12 bg-white shadow-lg rounded-xl p-6">

        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            ✏️ Update Todo
        </h1>

        <!-- Back Button -->
        <div class="mb-4">
            <a href="/todo/list/" 
               class="text-blue-500 hover:underline">
                ← Back to List
            </a>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Title -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Title
                </label>
                <input type="text" name="title" value="{{ todo.title }}"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Description
                </label>
                <textarea name="description" rows="4"
                          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">{{ todo.description }}</textarea>
            </div>

            <!-- Completed Checkbox -->
            <div class="flex items-center space-x-2">
                <input type="checkbox" name="completed"
                       class="w-5 h-5 text-green-500 border-gray-300 rounded focus:ring-green-400"
                       {% if todo.completed %}checked{% endif %}>
                <label class="text-gray-700 font-medium">
                    Mark as Completed
                </label>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-between items-center">
                <a href="/todo/list/" 
                   class="text-gray-500 hover:text-gray-700">
                    Cancel
                </a>

                <button type="submit"
                        class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg shadow">
                    🔄 Update Todo
                </button>
            </div>

        </form>

    </div>

</body>
</html>
